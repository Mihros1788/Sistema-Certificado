<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Certificado</title>

  <!-- Fonte -->
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@1,700&display=swap" rel="stylesheet">

  <!-- Biblioteca PDF -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #eee;
      margin: 0;
      text-align: center;
    }

    .formulario {
      padding: 20px;
    }

    input {
      padding: 12px;
      width: 90%;
      max-width: 400px;
      font-size: 16px;
    }

    button {
      padding: 12px 20px;
      margin: 5px;
      background: #4CAF50;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    button:hover {
      background: #3e8e41;
    }

    #preview {
      display: none;
      margin-top: 20px;
    }

    /* =========================
       CERTIFICADO (FIXO PDF)
    ========================= */
    .container {
      position: relative;
      width: 1123px;   /* A4 paisagem fixo */
      height: 794px;
      margin: auto;
    }

    .container img {
      width: 100%;
      height: 100%;
      display: block;
    }

    .nome {
      position: absolute;
      top: 42%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-family: 'Fraunces', serif;
      font-size: 50px; /* FIXO (resolve problema mobile) */
      font-weight: 700;
      color: black;
      width: 80%;
      text-align: center;
      word-break: break-word;
    }

    /* Só interface mobile (não afeta PDF) */
    @media screen and (max-width: 768px) {
      .container {
        width: 95vw;
        height: calc(95vw * 0.707);
      }
    }
  </style>
</head>

<body>

  <div class="formulario">
    <h2>Gerador de Certificado</h2>

    <input type="text" id="nome" placeholder="Digite seu nome">

    <br>

    <button onclick="gerar()">Gerar Certificado</button>
    <button onclick="baixarPDF()" id="btnPDF" style="display:none;">
      Baixar PDF
    </button>
  </div>

  <div id="preview">
    <div class="container" id="certificado">
      <img src="certificado_base.jpeg" alt="Certificado">
      <div class="nome" id="nomeCert">SEU NOME</div>
    </div>
  </div>

  <script>
    function gerar() {
      const nome = document.getElementById("nome").value.trim();

      if (!nome) {
        alert("Digite seu nome!");
        return;
      }

      document.getElementById("nomeCert").innerText = nome.toUpperCase();
      document.getElementById("preview").style.display = "block";
      document.getElementById("btnPDF").style.display = "inline-block";
    }

    function baixarPDF() {
      const elemento = document.getElementById("certificado");

      const opt = {
        margin: 0,
        filename: 'certificado.pdf',
        image: { type: 'jpeg', quality: 1 },

        html2canvas: {
          scale: 4,
          useCORS: true,
          windowWidth: 1123,
          windowHeight: 794
        },

        jsPDF: {
          unit: 'px',
          format: [1123, 794],
          orientation: 'landscape'
        }
      };

      html2pdf().set(opt).from(elemento).save();
    }
  </script>

</body>
</html>
