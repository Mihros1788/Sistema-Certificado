<!DOCTYPE html> 
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Certificado</title>

  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@1,700&display=swap" rel="stylesheet">

  <!-- PDF -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

  <style>
    body {
      font-family: sans-serif;
      text-align: center;
      background-color: #eee;
      margin: 0;
      padding: 0;
    }

    .formulario {
      margin: 20px;
      padding: 10px;
    }

    label {
      display: block;
      font-size: 18px;
      margin-bottom: 5px;
      font-weight: bold;
    }

    input {
      padding: 12px;
      font-size: 18px;
      width: 90%;
      max-width: 500px;
      margin: 0 auto 10px auto;
      display: block;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    button {
      padding: 15px 30px;
      font-size: 18px;
      margin: 10px;
      cursor: pointer;
      border-radius: 5px;
      width: 90%;
      max-width: 300px;
      background-color: #4CAF50;
      color: white;
      border: none;
    }

    button:hover {
      background-color: #45a049;
    }

    #preview {
      display: none;
    }

    #btnBaixar {
      display: none;
    }

    /* ===== CERTIFICADO ===== */
    .container {
      position: relative;
      width: 100%;
      max-width: 1123px;
      aspect-ratio: 1123 / 794;
      margin: 0 auto;
    }

    .certificado {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .nome-dinamico {
      position: absolute;
      top: 39%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: clamp(18px, 3vw, 40px);
      font-family: 'Fraunces', serif;
      font-weight: 700;
      color: #000;
      width: 80%;
      text-align: center;
    }

    @media screen and (max-width: 768px) {
      body {
        min-width: 100vh;
      }
    }

    @page {
      size: A4 landscape;
      margin: 0;
    }
  </style>
</head>

<body>

  <div class="formulario">
    <h2>Gerador de Certificado</h2>

    <label>Nome Completo:</label>
    <input type="text" id="nome" placeholder="Digite o nome completo" />

    <button onclick="gerar()">Gerar Certificado</button>
    <button id="btnBaixar" onclick="baixarPDF()">Baixar PDF</button>
  </div>

  <div id="preview">
    <div class="container" id="certificado">
      <img src="certificado_base.jpeg" class="certificado">
      <div class="nome-dinamico" id="nome-certificado">SEU NOME AQUI</div>
    </div>
  </div>

  <script>
    function gerar() {
      let nome = document.getElementById('nome').value.trim();

      if (nome === '') {
        alert('Por favor, insira um nome.');
        return;
      }

      document.getElementById('nome-certificado').innerText = nome.toUpperCase();
      document.getElementById('preview').style.display = 'block';
      document.getElementById('btnBaixar').style.display = 'inline-block';
    }

    function baixarPDF() {
      const elemento = document.getElementById("certificado");

      const opt = {
        margin: 0,
        filename: 'certificado.pdf',
        image: { type: 'jpeg', quality: 1 },

        html2canvas: {
          scale: 3,
          useCORS: true
        },

        jsPDF: {
          unit: 'mm',
          format: 'a4',
          orientation: 'landscape'
        }
      };

      html2pdf().set(opt).from(elemento).save();
    }
  </script>

</body>
</html>
