<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Certificado</title>

  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@1,700&display=swap" rel="stylesheet">

  <!-- Biblioteca para gerar PDF -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

  <style>
    body {
      font-family: sans-serif;
      text-align: center;
      background: #eee;
      margin: 0;
      padding: 0;
    }

    .formulario {
      padding: 20px;
    }

    input {
      padding: 12px;
      width: 90%;
      max-width: 400px;
      font-size: 16px;
      margin: 10px 0;
    }

    button {
      padding: 12px 20px;
      font-size: 16px;
      border: none;
      background: #4CAF50;
      color: white;
      border-radius: 6px;
      cursor: pointer;
      margin: 5px;
    }

    button:hover {
      background: #3e8e41;
    }

    #preview {
      display: none;
      margin-top: 20px;
    }

    .container {
      position: relative;
      width: 100%;
      max-width: 1100px;
      margin: auto;
      aspect-ratio: 1123 / 794;
    }

    .container img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    .nome {
      position: absolute;
      top: 42%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-family: 'Fraunces', serif;
      font-size: clamp(18px, 3vw, 42px);
      font-weight: bold;
      color: black;
      width: 80%;
      text-align: center;
    }

    /* PRINT (mantém qualidade do PDF) */
    @media print {
      body * {
        visibility: hidden;
      }

      #preview, #preview * {
        visibility: visible;
      }

      #preview {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
      }
    }
  </style>
</head>

<body>

  <div class="formulario">
    <h2>Gerador de Certificado</h2>

    <input type="text" id="nome" placeholder="Digite seu nome">

    <br>

    <button onclick="gerar()">Gerar Certificado</button>
    <button onclick="baixarPDF()" id="btnPDF" style="display:none;">Baixar PDF</button>
  </div>

  <div id="preview">
    <div class="container" id="certificado">
      <img src="certificado_base.jpeg" alt="Certificado">
      <div class="nome" id="nomeCert">Seu Nome</div>
    </div>
  </div>

  <script>
    function gerar() {
      const nome = document.getElementById("nome").value.trim();

      if (!nome) {
        alert("Digite seu nome!");
        return;
      }

      document.getElementById("nomeCert").innerText = nome.toUpperCase();
      document.getElementById("preview").style.display = "block";
      document.getElementById("btnPDF").style.display = "inline-block";
    }

    function baixarPDF() {
      const elemento = document.getElementById("certificado");

      const opt = {
        margin: 0,
        filename: 'certificado.pdf',
        image: { type: 'jpeg', quality: 1 },
        html2canvas: { scale: 2 },
        jsPDF: { unit: 'mm', format: 'a4', orientation: 'landscape' }
      };

      html2pdf().set(opt).from(elemento).save();
    }
  </script>

</body>
</html>
