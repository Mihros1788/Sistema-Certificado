<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Certificado</title>

  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@1,700&display=swap" rel="stylesheet">

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #eee;
      text-align: center;
    }

    .formulario {
      padding: 20px;
    }

    input {
      width: 90%;
      max-width: 400px;
      padding: 12px;
      font-size: 16px;
    }

    button {
      padding: 12px 20px;
      margin: 5px;
      border: none;
      background: #4CAF50;
      color: white;
      border-radius: 6px;
      cursor: pointer;
    }

    #preview {
      display: none;
      margin-top: 20px;
    }

    /* =========================
       CERTIFICADO RESPONSIVO
    ========================= */
    .container {
      position: relative;

      /* 🔥 RESPONSIVO REAL */
      width: 95vw;
      max-width: 1123px;

      /* mantém proporção A4 paisagem */
      aspect-ratio: 1123 / 794;

      margin: auto;
    }

    .container img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .nome {
      position: absolute;
      top: 42%;
      left: 50%;
      transform: translate(-50%, -50%);

      font-family: 'Fraunces', serif;

      /* 🔥 responsivo sem quebrar */
      font-size: clamp(18px, 3.5vw, 50px);

      font-weight: 700;
      color: black;
      width: 80%;
      text-align: center;
      word-break: break-word;
    }

    /* =========================
       PDF (IGNORA RESPONSIVIDADE)
    ========================= */
    @media print {
      body * {
        visibility: hidden;
      }

      #preview, #preview * {
        visibility: visible;
      }
    }
  </style>
</head>

<body>

  <div class="formulario">
    <h2>Gerador de Certificado</h2>

    <input type="text" id="nome" placeholder="Digite seu nome">

    <br>

    <button onclick="gerar()">Gerar Certificado</button>
    <button onclick="baixarPDF()" id="btnPDF" style="display:none;">
      Baixar PDF
    </button>
  </div>

  <div id="preview">
    <div class="container" id="certificado">
      <img src="certificado_base.jpeg" alt="Certificado">
      <div class="nome" id="nomeCert">SEU NOME</div>
    </div>
  </div>

  <script>
    function gerar() {
      const nome = document.getElementById("nome").value.trim();

      if (!nome) {
        alert("Digite seu nome!");
        return;
      }

      document.getElementById("nomeCert").innerText = nome.toUpperCase();
      document.getElementById("preview").style.display = "block";
      document.getElementById("btnPDF").style.display = "inline-block";
    }

    function baixarPDF() {
      const elemento = document.getElementById("certificado");

      const opt = {
        margin: 0,
        filename: 'certificado.pdf',

        image: {
          type: 'jpeg',
          quality: 1
        },

        html2canvas: {
          scale: 3,
          useCORS: true
        },

        jsPDF: {
          unit: 'mm',
          format: 'a4',
          orientation: 'landscape'
        }
      };

      html2pdf().set(opt).from(elemento).save();
    }
  </script>

</body>
</html>
