<!DOCTYPE html> 
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Certificado</title>

  <!-- Fonte -->
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@1,700&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: sans-serif;
      text-align: center;
      background-color: #eee;
      margin: 0;
      padding: 0;
    }

    .formulario {
      margin: 20px;
      padding: 10px;
    }

    label {
      display: block;
      font-size: 18px;
      margin-bottom: 5px;
      font-weight: bold;
    }

    input {
      padding: 12px;
      font-size: 18px;
      width: 90%;
      max-width: 500px;
      margin: 0 auto 10px auto;
      display: block;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    button {
      padding: 15px 30px;
      font-size: 18px;
      margin: 10px;
      cursor: pointer;
      border-radius: 5px;
      width: 90%;
      max-width: 300px;
      background-color: #4CAF50;
      color: white;
      border: none;
      transition: background-color 0.3s;
    }

    button:hover {
      background-color: #45a049;
    }

    #preview {
      display: none;
    }

    #btnImprimir {
      display: none;
    }

    /* ===== CERTIFICADO RESPONSIVO ===== */
    .container {
      position: relative;
      width: 100%;
      max-width: 1123px;
      aspect-ratio: 1123 / 794;
      margin: 0 auto;
    }

    .certificado {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .nome-dinamico {
      position: absolute;
      top: 39%; /* 🔥 AJUSTADO (um pouco mais para baixo) */
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: clamp(18px, 3vw, 40px);
      font-family: 'Fraunces', serif;
      font-weight: 700;
      color: #000;
      width: 80%;
      text-align: center;
    }

    /* ===== MOBILE ===== */
    @media screen and (max-width: 768px) {

      .container {
        width: 100vw;
        height: auto;
      }

      #preview {
        overflow-x: auto;
      }

      body {
        min-width: 100vh;
      }
    }

    /* ===== PRINT ===== */
    @media print {

      html, body {
        width: 297mm;
        height: 210mm;
      }

      body {
        visibility: hidden;
        margin: 0;
        padding: 0;
      }

      #preview {
        visibility: visible;
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
      }

      .container {
        width: 297mm;
        height: 210mm;
      }
    }

    @page {
      size: A4 landscape;
      margin: 0;
    }

  </style>
</head>

<body>

  <div class="formulario">
    <h2>Gerador de Certificado</h2>

    <label for="nome">Nome Completo:</label>
    <input type="text" id="nome" placeholder="Digite o nome completo" />

    <button onclick="gerar()">Gerar Certificado</button>
    <button id="btnImprimir" onclick="window.print()">Imprimir / Salvar como PDF</button>
  </div>

  <div id="preview">
    <div class="container">
      <img src="certificado_base.jpeg" class="certificado" alt="Certificado" />

      <div class="nome-dinamico" id="nome-certificado">SEU NOME AQUI</div>
    </div>
  </div>

  <script>
    function gerar() {
      let nome = document.getElementById('nome').value.trim();

      if (nome === '') {
        alert('Por favor, insira um nome.');
        return;
      }

      nome = nome.toUpperCase();

      document.getElementById('nome-certificado').innerText = nome;
      document.getElementById('preview').style.display = 'block';
      document.getElementById('btnImprimir').style.display = 'inline-block';
    }
  </script>

</body>
</html>
