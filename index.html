<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Certificado</title>

  <!-- Fonte -->
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@1,700&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: sans-serif;
      text-align: center;
      background-color: #eee;
      margin: 0;
      padding: 0;
    }

    .container {
      position: relative;
      width: 1123px;
      height: 794px;
      margin: 0 auto;
    }

    .certificado {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .nome-dinamico {
      position: absolute;
      top: 41%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 40px;
      font-family: 'Fraunces', serif;
      font-weight: 700;
      color: #000;
      width: 80%;
      text-align: center;
    }

    .formulario {
      margin: 20px;
    }

    label {
      display: block;
      font-size: 18px;
      margin-bottom: 5px;
      font-weight: bold;
    }

    input {
      padding: 10px;
      font-size: 16px;
      width: 500px;
      margin-bottom: 10px;
      display: block;
      margin-left: auto;
      margin-right: auto;
    }

    button {
      padding: 15px 30px;
      font-size: 18px;
      margin: 10px;
      cursor: pointer;
      border-radius: 5px;
      width: 300px;
      background-color: #4CAF50;
      color: white;
      border: none;
      transition: background-color 0.3s;
    }

    button:hover {
      background-color: #45a049;
    }

    #preview {
      display: none;
    }

    #btnImprimir {
      display: none;
    }

    @media print {
      body {
        visibility: hidden;
        margin: 0;
      }
      #preview {
        visibility: visible;
        position: absolute;
        left: 0;
        top: 0;
        width: 1123px;
        height: 794px;
      }
    }

    @page {
      size: A4 landscape;
      margin: 0;
    }
  </style>
</head>

<body>

  <div class="formulario">
    <h2>Gerador de Certificado</h2>

    <label for="nome">Nome Completo:</label>
    <input type="text" id="nome" placeholder="Digite o nome completo" />

    <button onclick="gerar()">Gerar Certificado</button>
    <button id="btnImprimir" onclick="window.print()">Imprimir / Salvar como PDF</button>
  </div>

  <div id="preview">
    <div class="container">
      <!-- CORRIGIDO: .jpeg -->
      <img src="certificado_base.jpeg" class="certificado" alt="Certificado" />

      <div class="nome-dinamico" id="nome-certificado">SEU NOME AQUI</div>
    </div>
  </div>

  <script>
    function gerar() {
      let nome = document.getElementById('nome').value.trim();

      if (nome === '') {
        alert('Por favor, insira um nome.');
        return;
      }

      // força maiúsculo no certificado
      nome = nome.toUpperCase();

      document.getElementById('nome-certificado').innerText = nome;
      document.getElementById('preview').style.display = 'block';
      document.getElementById('btnImprimir').style.display = 'inline-block';
    }
  </script>

</body>
</html>
